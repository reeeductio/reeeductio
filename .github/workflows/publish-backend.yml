name: Publish Backend

on:
  push:
    tags:
      - 'v[0-9]*' # full release
      - 'backend/v[0-9]*' # backend only: Use for x.y.z bugfix releases

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # setuptools-scm needs full history to determine version from tags

      - name: Compute image tags
        id: meta
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#backend/}"
          VERSION="${VERSION#v}"
          MAJOR="${VERSION%%.*}"
          MINOR="${VERSION#*.}"; MINOR="${MINOR%%.*}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          printf 'tags<<EOF\n%s\n%s\n%s\nEOF\n' \
            "${IMAGE}:${VERSION}" \
            "${IMAGE}:${MAJOR}.${MINOR}" \
            "${IMAGE}:${MAJOR}" \
            >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
