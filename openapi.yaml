openapi: 3.0.3
info:
  title: "reeeductio Spaces API"
  description: |
    End-to-end encrypted messaging system with capability-based authorization.

    ## Architecture
    - **Spaces**: Access control boundary (one shared symmetric key)
    - **Messages**: Append-only message streams (topics) forming blockchain-like chains
    - **Blobs**: Content-addressed encrypted binary storage
    - **Data**: Simple key-value store for application data
    - **State**: Event-sourced key-value store with temporal guarantees (includes auth)
    - **Capabilities**: Granular, signed permissions using public key cryptography

    ## Security Model
    - Zero-knowledge server (can't decrypt message content)
    - Capability-based authorization with signature verification
    - Message integrity via hash chains with compare-and-swap
    - Chain of trust verification from every member back to space admin
    - Space creator (space public key) has implicit admin rights
  version: 1.0.0
  contact:
    name: API Support

servers:
  - url: http://localhost:8000
    description: Local development server
  - url: https://api.example.com
    description: Production server

tags:
  - name: Authentication
    description: Challenge-response authentication using Ed25519 signatures
  - name: Messages
    description: Blockchain-style message streams (topics)
  - name: Blobs
    description: Content-addressed encrypted file storage
  - name: Data
    description: Simple key-value store for application data
  - name: State
    description: Event-sourced key-value store (auth and temporal state)
  - name: WebSocket
    description: Real-time message streaming
  - name: Admin
    description: Server administration endpoints for managing users, spaces, and blobs

paths:
  /spaces/{space_id}/auth/challenge:
    post:
      tags: [Authentication]
      summary: Request authentication challenge
      description: Get a random nonce to sign for authentication
      parameters:
        - $ref: '#/components/parameters/SpaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [public_key]
              properties:
                public_key:
                  type: string
                  pattern: '^[A-Za-z0-9_-]{44}$'
                  minLength: 44
                  maxLength: 44
                  description: Typed user identifier (44-char URL-safe base64, Ed25519 public key with header byte)
      responses:
        '200':
          description: Challenge issued successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  challenge:
                    type: string
                    format: base64
                    description: Random nonce to sign
                  expires_at:
                    type: integer
                    format: int64
                    description: Unix timestamp in milliseconds when challenge expires
        '400':
          $ref: '#/components/responses/BadRequest'

  /spaces/{space_id}/auth/verify:
    post:
      tags: [Authentication]
      summary: Verify signed challenge and get JWT
      description: Submit signed challenge to authenticate and receive JWT token
      parameters:
        - $ref: '#/components/parameters/SpaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [public_key, signature, challenge]
              properties:
                public_key:
                  type: string
                  pattern: '^[A-Za-z0-9_-]{44}$'
                  minLength: 44
                  maxLength: 44
                  description: Typed user identifier (44-char URL-safe base64)
                signature:
                  type: string
                  format: base64
                  description: Signature of challenge
                challenge:
                  type: string
                  format: base64
                  description: The challenge that was signed
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: JWT bearer token
                  expires_at:
                    type: integer
                    format: int64
                    description: Unix timestamp in milliseconds when token expires
        '401':
          $ref: '#/components/responses/Unauthorized'

  /spaces/{space_id}/auth/refresh:
    post:
      tags: [Authentication]
      summary: Refresh JWT token
      description: Get a new JWT token before the current one expires
      parameters:
        - $ref: '#/components/parameters/SpaceId'
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: New JWT bearer token
                  expires_at:
                    type: integer
                    format: int64
        '401':
          $ref: '#/components/responses/Unauthorized'

  /spaces/{space_id}/data/{path}:
    get:
      tags: [Data]
      summary: Get data value
      description: Retrieve simple key-value data as base64-encoded string
      parameters:
        - $ref: '#/components/parameters/SpaceId'
        - name: path
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9._-]+(/[a-zA-Z0-9._-]+)*$'
          description: |
            Data path using slug-formatted segments (alphanumeric, dots, hyphens, underscores).
            Examples: "profiles/alice", "settings/theme", "cache/user_list"
            Wildcards like {self}, {any} are NOT allowed in user-created paths.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Data retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEntry'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    put:
      tags: [Data]
      summary: Set data value
      description: |
        Create or update simple key-value data with cryptographic signature verification.
        All data entries must be signed - the server verifies the signature before storing.
      parameters:
        - $ref: '#/components/parameters/SpaceId'
        - name: path
          in: path
          required: true
          schema:
            type: string
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [data, signature, signed_by, signed_at]
              properties:
                data:
                  type: string
                  format: base64
                  description: Base64-encoded data (interpretation is context-dependent)
                signature:
                  type: string
                  format: base64
                  description: Ed25519 signature over (space_id|path|data|signed_at) by signer (REQUIRED for all data writes)
                signed_by:
                  type: string
                  pattern: '^[A-Za-z0-9_-]{44}$'
                  minLength: 44
                  maxLength: 44
                  description: Typed user/tool identifier of signer (REQUIRED for all data writes)
                signed_at:
                  type: integer
                  format: int64
                  description: Unix timestamp in milliseconds when entry was signed (REQUIRED for all data writes)
      responses:
        '200':
          description: Data updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  path:
                    type: string
                  signed_at:
                    type: integer
                    format: int64
                    description: Unix timestamp in milliseconds from the signed data entry
        '400':
          description: Invalid signature or missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /spaces/{space_id}/state:
    get:
      tags: [State]
      summary: Query all state messages
      description: |
        Retrieve all state change messages from the "state" topic. This is effectively
        an alias for GET /spaces/{space_id}/topics/state/messages. State is stored as
        messages with the state path in the "type" field.
      parameters:
        - $ref: '#/components/parameters/SpaceId'
        - name: from
          in: query
          schema:
            type: integer
            format: int64
          description: Server timestamp in milliseconds (inclusive) - get messages after this time
        - name: to
          in: query
          schema:
            type: integer
            format: int64
          description: Server timestamp in milliseconds (inclusive) - get messages before this time
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 1000
          description: Maximum number of messages to return
      security:
        - BearerAuth: []
      responses:
        '200':
          description: State messages retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: '#/components/schemas/Message'
                  has_more:
                    type: boolean
                    description: Whether more messages exist beyond the limit
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /spaces/{space_id}/state/{path}:
    get:
      tags: [State]
      summary: Get current state at path
      description: |
        Retrieve the current (materialized) state value at a specific path. The server
        computes this by replaying state messages from the "state" topic to find the
        latest value for this path.
      parameters:
        - $ref: '#/components/parameters/SpaceId'
        - name: path
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9._-]+(/[a-zA-Z0-9._-]+)*$'
          description: |
            State path using slug-formatted segments (alphanumeric, dots, hyphens, underscores).
            Examples: "auth/users/U_abc123", "auth/roles/admin", "config/settings"
            Wildcards like {self}, {any} are NOT allowed in user-created paths.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: State retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    put:
      tags: [State]
      summary: Set state value
      description: |
        Create or update state by posting a message to the "state" topic. The message's
        "type" field contains the state path, and the "data" field contains the state value.
        Server validates chain integrity (prev_hash) and creates an immutable audit log.
      parameters:
        - $ref: '#/components/parameters/SpaceId'
        - name: path
          in: path
          required: true
          schema:
            type: string
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prev_hash, data, message_hash, signature, signed_at]
              properties:
                prev_hash:
                  type: string
                  pattern: '^[A-Za-z0-9_-]{44}$'
                  minLength: 44
                  maxLength: 44
                  nullable: true
                  description: Typed message identifier of previous message in state topic (null for first state message)
                data:
                  type: string
                  format: base64
                  maxLength: 102400
                  description: Base64-encoded state data (max 100 KB)
                message_hash:
                  type: string
                  pattern: '^[A-Za-z0-9_-]{44}$'
                  minLength: 44
                  maxLength: 44
                  description: Typed message identifier (SHA256 hash with header, client-computed)
                signature:
                  type: string
                  format: base64
                  description: Ed25519 signature over message_hash by sender
                signed_at:
                  type: integer
                  format: int64
                  description: Unix timestamp in milliseconds when state was signed (REQUIRED)
      responses:
        '201':
          description: State message created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message_hash:
                    type: string
                    pattern: '^[A-Za-z0-9_-]{44}$'
                    minLength: 44
                    maxLength: 44
                  server_timestamp:
                    type: integer
                    format: int64
                    description: Unix timestamp in milliseconds
        '400':
          description: Invalid message (bad hash, broken chain, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Chain conflict (prev_hash doesn't match current head)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /spaces/{space_id}/topics/{topic_id}/messages:
    get:
      tags: [Messages]
      summary: Query messages in a topic
      description: Retrieve messages with optional time-based filtering
      parameters:
        - $ref: '#/components/parameters/SpaceId'
        - $ref: '#/components/parameters/TopicId'
        - name: from
          in: query
          schema:
            type: integer
            format: int64
          description: Server timestamp in milliseconds (inclusive) - get messages after this time
        - name: to
          in: query
          schema:
            type: integer
            format: int64
          description: Server timestamp in milliseconds (inclusive) - get messages before this time
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 1000
          description: Maximum number of messages to return
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Messages retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: '#/components/schemas/Message'
                  has_more:
                    type: boolean
                    description: Whether more messages exist beyond the limit
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags: [Messages]
      summary: Post a message to a topic
      description: |
        Publish an encrypted message to the topic. Server validates:
        - User has 'create' capability on this topic's message path
        - prev_hash matches the current chain head
        - Message hash is correctly computed
      parameters:
        - $ref: '#/components/parameters/SpaceId'
        - $ref: '#/components/parameters/TopicId'
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, prev_hash, data, message_hash, signature]
              properties:
                type:
                  type: string
                  description: |
                    Message type/category. For state messages in the "state" topic, this contains
                    the state path (e.g., "auth/users/U_abc123"). For regular messages, can be used
                    for app-specific categorization (e.g., "chat", "notification").
                  example: "chat"
                prev_hash:
                  type: string
                  pattern: '^[A-Za-z0-9_-]{44}$'
                  minLength: 44
                  maxLength: 44
                  nullable: true
                  description: Typed message identifier of previous message (null for first message)
                data:
                  type: string
                  format: base64
                  maxLength: 102400
                  description: Encrypted message or state data (max 100 KB, base64-encoded)
                message_hash:
                  type: string
                  pattern: '^[A-Za-z0-9_-]{44}$'
                  minLength: 44
                  maxLength: 44
                  description: Typed message identifier (SHA256 hash with header, client-computed)
                signature:
                  type: string
                  format: base64
                  description: Ed25519 signature over message_hash by sender
      responses:
        '201':
          description: Message created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message_hash:
                    type: string
                    pattern: '^[A-Za-z0-9_-]{44}$'
                    minLength: 44
                    maxLength: 44
                  server_timestamp:
                    type: integer
                    format: int64
                    description: Unix timestamp in milliseconds
        '400':
          description: Invalid message (bad hash, broken chain, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Chain conflict (prev_hash doesn't match current head)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /spaces/{space_id}/topics/{topic_id}/messages/{message_hash}:
    get:
      tags: [Messages]
      summary: Get specific message by hash from a topic
      description: Retrieve a single message from a specific topic using its content hash
      parameters:
        - $ref: '#/components/parameters/SpaceId'
        - $ref: '#/components/parameters/TopicId'
        - name: message_hash
          in: path
          required: true
          schema:
            type: string
            pattern: '^[A-Za-z0-9_-]{44}$'
            minLength: 44
            maxLength: 44
          description: Typed message identifier (SHA256 hash with header)
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Message retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /spaces/{space_id}/stream:
    get:
      tags: [WebSocket]
      summary: WebSocket stream for real-time space messages
      description: |
        Establishes a WebSocket connection to receive real-time messages from all topics in the space.

        **Protocol**: WebSocket (ws:// or wss://)

        **Authentication**: Pass JWT token as query parameter `?token=<jwt>` or in the `Sec-WebSocket-Protocol` header.

        **Message Format**: JSON-encoded message objects (same schema as Message)

        **Connection**: Upgrade from HTTP to WebSocket using standard WebSocket handshake.
      parameters:
        - $ref: '#/components/parameters/SpaceId'
        - name: token
          in: query
          required: false
          schema:
            type: string
          description: JWT bearer token for authentication (alternative to Sec-WebSocket-Protocol header)
      responses:
        '101':
          description: Switching Protocols - WebSocket connection established
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      x-websocket:
        messageSchema:
          $ref: '#/components/schemas/Message'

  /spaces/{space_id}/blobs/{blob_id}:
    put:
      tags: [Blobs]
      summary: Upload encrypted blob
      description: |
        Upload encrypted binary data (attachments, images, etc.) with explicit blob_id.
        The blob_id must match the SHA256 hash of the content.
        Blobs are scoped to the space - only space members can access them.
      parameters:
        - $ref: '#/components/parameters/SpaceId'
        - name: blob_id
          in: path
          required: true
          schema:
            type: string
            pattern: '^[A-Za-z0-9_-]{44}$'
            minLength: 44
            maxLength: 44
          description: Typed blob identifier (SHA256 hash with header)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
              maxLength: 104857600
      responses:
        '201':
          description: Blob uploaded successfully (direct upload to server)
          content:
            application/json:
              schema:
                type: object
                properties:
                  blob_id:
                    type: string
                    pattern: '^[A-Za-z0-9_-]{44}$'
                    minLength: 44
                    maxLength: 44
                    description: Typed blob identifier (SHA256 hash with header)
                  size:
                    type: integer
                    description: Size in bytes
        '307':
          description: Temporary redirect to S3 pre-signed URL for direct upload
          headers:
            Location:
              schema:
                type: string
                format: uri
              description: Pre-signed S3 URL for uploading the blob directly to object storage
        '400':
          description: Invalid blob_id format, type, or blob_id doesn't match content hash
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Blob already exists (duplicate content-addressed identifier)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '413':
          description: Blob too large (max 100 MB)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      tags: [Blobs]
      summary: Download blob
      description: |
        Retrieve encrypted blob by its content hash.
        Only accessible to members of the same space where the blob was uploaded.
      parameters:
        - $ref: '#/components/parameters/SpaceId'
        - name: blob_id
          in: path
          required: true
          schema:
            type: string
            pattern: '^[A-Za-z0-9_-]{44}$'
            minLength: 44
            maxLength: 44
          description: Typed blob identifier
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Blob retrieved successfully (direct download from server)
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '307':
          description: Temporary redirect to S3 pre-signed URL for direct download
          headers:
            Location:
              schema:
                type: string
                format: uri
              description: Pre-signed S3 URL for downloading the blob directly from object storage
        '403':
          description: Blob belongs to a different space
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

    delete:
      tags: [Blobs]
      summary: Delete blob
      description: |
        Remove blob from storage.
        Only the uploader or space admin can delete a blob.
      parameters:
        - $ref: '#/components/parameters/SpaceId'
        - name: blob_id
          in: path
          required: true
          schema:
            type: string
            pattern: '^[A-Za-z0-9_-]{44}$'
            minLength: 44
            maxLength: 44
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Blob deleted successfully
        '403':
          description: Not authorized to delete this blob (must be uploader or space admin)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # Admin API Endpoints
  /admin/auth/challenge:
    post:
      tags: [Admin]
      summary: Request admin authentication challenge
      description: |
        Convenience endpoint to get an authentication challenge for the admin space.
        This allows clients to authenticate without knowing the admin space ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [public_key]
              properties:
                public_key:
                  type: string
                  pattern: '^[A-Za-z0-9_-]{44}$'
                  minLength: 44
                  maxLength: 44
                  description: Typed user identifier (44-char URL-safe base64, Ed25519 public key with header byte)
      responses:
        '200':
          description: Challenge issued successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  challenge:
                    type: string
                    format: base64
                    description: Random nonce to sign
                  expires_at:
                    type: integer
                    format: int64
                    description: Unix timestamp in milliseconds when challenge expires
        '400':
          $ref: '#/components/responses/BadRequest'

  /admin/auth/verify:
    post:
      tags: [Admin]
      summary: Verify admin authentication and get JWT
      description: |
        Convenience endpoint to verify signed challenge and receive JWT token for the admin space.
        This allows clients to authenticate without knowing the admin space ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [public_key, signature, challenge]
              properties:
                public_key:
                  type: string
                  pattern: '^[A-Za-z0-9_-]{44}$'
                  minLength: 44
                  maxLength: 44
                  description: Typed user identifier (44-char URL-safe base64)
                signature:
                  type: string
                  format: base64
                  description: Signature of challenge
                challenge:
                  type: string
                  format: base64
                  description: The challenge that was signed
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: JWT bearer token for admin space
                  expires_at:
                    type: integer
                    format: int64
                    description: Unix timestamp in milliseconds when token expires
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/space:
    get:
      tags: [Admin]
      summary: Get the admin space ID
      description: |
        Returns the admin space ID. This allows clients to use the standard
        /spaces/{space_id}/* endpoints for admin operations like managing users,
        spaces, and performing other administrative tasks.

        After obtaining the admin space ID, clients should use the regular Space
        client with this ID to perform admin operations through the standard
        state and message endpoints.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Admin space ID retrieved successfully
          content:
            application/json:
              schema:
                type: object
                required: [space_id]
                properties:
                  space_id:
                    type: string
                    pattern: '^[A-Za-z0-9_-]{44}$'
                    minLength: 44
                    maxLength: 44
                    description: Typed admin space identifier
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/blobs/{blob_id}:
    delete:
      tags: [Admin]
      summary: Delete blob from storage
      description: |
        Delete a blob directly from the server's blob storage. This is an admin
        operation that bypasses normal space-scoped blob deletion, allowing
        server admins to remove orphaned or problematic blobs.

        This endpoint is necessary because blobs are stored separately from
        space state and cannot be deleted through the regular state API.
      parameters:
        - $ref: '#/components/parameters/BlobId'
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Blob deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /auth/verify

  parameters:
    SpaceId:
      name: space_id
      in: path
      required: true
      schema:
        type: string
        pattern: '^[A-Za-z0-9_-]{44}$'
        minLength: 44
        maxLength: 44
      description: Typed space identifier (44-char URL-safe base64, Ed25519 public key with header byte)

    TopicId:
      name: topic_id
      in: path
      required: true
      schema:
        type: string
        pattern: '^[a-z0-9][a-z0-9_-]{0,62}[a-z0-9]$'
        minLength: 2
        maxLength: 64
      description: Topic identifier (slug format - lowercase alphanumeric, hyphens, underscores)

    UserId:
      name: user_id
      in: path
      required: true
      schema:
        type: string
        pattern: '^[A-Za-z0-9_-]{44}$'
        minLength: 44
        maxLength: 44
      description: Typed user identifier (44-char URL-safe base64, Ed25519 public key with header byte)

    BlobId:
      name: blob_id
      in: path
      required: true
      schema:
        type: string
        pattern: '^[A-Za-z0-9_-]{44}$'
        minLength: 44
        maxLength: 44
      description: Typed blob identifier (SHA256 hash with header)

  schemas:
    Message:
      type: object
      properties:
        message_hash:
          type: string
          pattern: '^[A-Za-z0-9_-]{44}$'
          minLength: 44
          maxLength: 44
          description: Typed message identifier
        topic_id:
          type: string
          pattern: '^[a-z0-9][a-z0-9_-]{0,62}[a-z0-9]$'
        type:
          type: string
          description: |
            Message type/category. For state messages in the "state" topic, this field
            contains the state path (e.g., "auth/users/U_abc123"). For regular messages,
            this can be used for application-specific categorization (e.g., "chat", "notification").
          example: "auth/users/U_abc123"
        prev_hash:
          type: string
          pattern: '^[A-Za-z0-9_-]{44}$'
          minLength: 44
          maxLength: 44
          nullable: true
          description: Typed message identifier of previous message
        data:
          type: string
          format: base64
          maxLength: 102400
          description: Encrypted message or state data (max 100 KB, base64-encoded)
        sender:
          type: string
          pattern: '^[A-Za-z0-9_-]{44}$'
          minLength: 44
          maxLength: 44
          description: Typed user identifier of message sender
        signature:
          type: string
          format: base64
          description: Ed25519 signature over message_hash by sender
        server_timestamp:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds (for queries)

    Capability:
      type: object
      required: [op, path]
      properties:
        op:
          type: string
          enum: [read, create, write]
          description: Operation type (write is superset of create)
        path:
          type: string
          description: |
            State path pattern supporting wildcards:
            - {self} - resolves to acting user's ID
            - {any} - matches any single segment
            - {other} - matches any ID except acting user
            - Trailing / indicates prefix match
            Examples: "profiles/{self}/", "topics/{any}/messages/", "auth/users/{other}/banned"
          example: "profiles/{self}/"

    Member:
      type: object
      properties:
        public_key:
          type: string
          pattern: '^[A-Za-z0-9_-]{44}$'
          minLength: 44
          maxLength: 44
          description: Typed user identifier
        added_at:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds when member was added
        added_by:
          type: string
          pattern: '^[A-Za-z0-9_-]{44}$'
          minLength: 44
          maxLength: 44
          description: Typed user identifier of user who added this member

    Role:
      type: object
      required: [role_id, description, created_by, created_at, signature]
      description: |
        Role definition stored at path: auth/roles/{role_id}
        Capabilities for this role stored at: auth/roles/{role_id}/rights/{cap_id}
      properties:
        role_id:
          type: string
          pattern: '^[a-zA-Z0-9._-]+$'
          description: Human-readable role identifier (e.g., "admin", "user", "moderator")
          example: "user"
        description:
          type: string
          description: Human-readable description of this role
          example: "Default user role with read and post permissions"
        created_by:
          type: string
          pattern: '^[A-Za-z0-9_-]{44}$'
          minLength: 44
          maxLength: 44
          description: Typed user identifier of role creator
        created_at:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds when role was created
        signature:
          type: string
          format: base64
          description: Ed25519 signature over the role definition by creator

    RoleGrant:
      type: object
      required: [user_id, role_id, granted_by, granted_at, signature]
      description: |
        Role grant stored at path: auth/users/{user_id}/roles/{role_id}
        Grants a user membership in a role, inheriting all capabilities defined for that role.
      properties:
        user_id:
          type: string
          pattern: '^[A-Za-z0-9_-]{44}$'
          minLength: 44
          maxLength: 44
          description: Typed user identifier of the user receiving the role
        role_id:
          type: string
          pattern: '^[a-zA-Z0-9._-]+$'
          description: Human-readable role identifier being granted
          example: "user"
        granted_by:
          type: string
          pattern: '^[A-Za-z0-9_-]{44}$'
          minLength: 44
          maxLength: 44
          description: Typed user identifier of the user granting this role
        granted_at:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds when role was granted
        expires_at:
          type: integer
          format: int64
          description: Optional Unix timestamp in milliseconds when role grant expires
        signature:
          type: string
          format: base64
          description: Ed25519 signature over the role grant by granter

    DataEntry:
      type: object
      required: [path, data, signature, signed_by, signed_at]
      description: |
        Simple key-value data entry stored in the space's data store.
        Every data entry must be cryptographically signed.
      properties:
        path:
          type: string
          pattern: '^[a-zA-Z0-9._-]+(/[a-zA-Z0-9._-]+)*$'
          description: |
            Data path using slug-formatted segments (alphanumeric, dots, hyphens, underscores).
            Examples: "profiles/alice", "settings/theme", "cache/user_list"
            Wildcards like {self}, {any} are NOT allowed in user-created paths.
        data:
          type: string
          format: base64
          description: Base64-encoded data (interpretation is context-dependent)
        signature:
          type: string
          format: base64
          description: Ed25519 signature over the data entry (space_id|path|data|signed_at) by signer
        signed_by:
          type: string
          pattern: '^[A-Za-z0-9_-]{44}$'
          minLength: 44
          maxLength: 44
          description: Typed user/tool identifier of signer
        signed_at:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds when entry was signed

    StateEntry:
      description: |
        DEPRECATED: State is now stored as messages in the "state" topic.
        Use the Message schema instead. This schema is kept for backward compatibility.
      allOf:
        - $ref: '#/components/schemas/DataEntry'

    Error:
      type: object
      properties:
        error:
          type: string
          description: Error message
        code:
          type: string
          description: Error code
        details:
          type: object
          description: Additional error details

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Unauthorized:
      description: Authentication required or failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
