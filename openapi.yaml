openapi: 3.0.3
info:
  title: "reeeductio Spaces API"
  description: |
    End-to-end encrypted messaging system with capability-based authorization.

    ## Architecture
    - **Spaces**: Access control boundary (one shared symmetric key)
    - **Messages**: Append-only message streams (topics) forming blockchain-like chains
    - **Blobs**: Content-addressed encrypted binary storage
    - **Data**: Simple key-value store for application data
    - **State**: Event-sourced key-value store with temporal guarantees (includes auth)
    - **Capabilities**: Granular, signed permissions using public key cryptography

    ## Security Model
    - Zero-knowledge server (can't decrypt message content)
    - Capability-based authorization with signature verification
    - Message integrity via hash chains with compare-and-swap
    - Chain of trust verification from every member back to space admin
    - Space creator (space public key) has implicit admin rights
  version: 1.0.0
  contact:
    name: API Support

servers:
  - url: http://localhost:8000
    description: Local development server
  - url: https://api.example.com
    description: Production server

tags:
  - name: Authentication
    description: Challenge-response authentication using Ed25519 signatures
  - name: OPAQUE
    description: |
      Password-based key recovery using OPAQUE (Oblivious Pseudo-Random Function + Authenticated Key Exchange).

      OPAQUE enables password-based login without exposing passwords or derived keys to the server.
      It is used for **key recovery only** — after OPAQUE completes, the client holds its Ed25519
      private key and must still authenticate via the standard challenge-response flow.

      Key design points:
      - Ed25519 keypairs are randomly generated, not derived from passwords
      - Password changes re-wrap the same keypair; public keys never change
      - Credentials are wrapped using OPAQUE's `export_key` with HKDF + AES-GCM
      - OPAQUE is an optional per-space feature; spaces can remain keypair-only
  - name: Messages
    description: Blockchain-style message streams (topics)
  - name: Blobs
    description: Content-addressed encrypted file storage
  - name: Data
    description: Simple key-value store for application data
  - name: State
    description: Event-sourced key-value store (auth and temporal state)
  - name: WebSocket
    description: Real-time message streaming
  - name: Admin
    description: Server administration endpoints for managing users, spaces, and blobs

paths:
  /spaces/{space_id}/auth/challenge:
    post:
      tags: [Authentication]
      summary: Request authentication challenge
      description: Get a random nonce to sign for authentication
      parameters:
        - $ref: '#/components/parameters/SpaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [public_key]
              properties:
                public_key:
                  type: string
                  pattern: '^[A-Za-z0-9_-]{44}$'
                  minLength: 44
                  maxLength: 44
                  description: Typed user identifier (44-char URL-safe base64, Ed25519 public key with header byte)
      responses:
        '200':
          description: Challenge issued successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  challenge:
                    type: string
                    format: base64
                    description: Random nonce to sign
                  expires_at:
                    type: integer
                    format: int64
                    description: Unix timestamp in milliseconds when challenge expires
        '400':
          $ref: '#/components/responses/BadRequest'

  /spaces/{space_id}/auth/verify:
    post:
      tags: [Authentication]
      summary: Verify signed challenge and get JWT
      description: Submit signed challenge to authenticate and receive JWT token
      parameters:
        - $ref: '#/components/parameters/SpaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [public_key, signature, challenge]
              properties:
                public_key:
                  type: string
                  pattern: '^[A-Za-z0-9_-]{44}$'
                  minLength: 44
                  maxLength: 44
                  description: Typed user identifier (44-char URL-safe base64)
                signature:
                  type: string
                  format: base64
                  description: Signature of challenge
                challenge:
                  type: string
                  format: base64
                  description: The challenge that was signed
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: JWT bearer token
                  expires_at:
                    type: integer
                    format: int64
                    description: Unix timestamp in milliseconds when token expires
        '401':
          $ref: '#/components/responses/Unauthorized'

  /spaces/{space_id}/auth/refresh:
    post:
      tags: [Authentication]
      summary: Refresh JWT token
      description: Get a new JWT token before the current one expires
      parameters:
        - $ref: '#/components/parameters/SpaceId'
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: New JWT bearer token
                  expires_at:
                    type: integer
                    format: int64
        '401':
          $ref: '#/components/responses/Unauthorized'

  /spaces/{space_id}/opaque/register/init:
    post:
      tags: [OPAQUE]
      summary: Start OPAQUE registration
      description: |
        Begin the OPAQUE registration flow. The client sends a blinded password element
        (RegistrationRequest) and receives a server-evaluated response (RegistrationResponse).

        This is step 1 of 2 in OPAQUE registration. After receiving the response, the client
        computes its registration record and submits it via `/opaque/register/finish`.

        **Requires authentication**: Only authenticated space members can register OPAQUE usernames.
        This ensures that either an admin is registering a tool account, or a user is registering
        their own credentials after being added to the space.

        **Protocol**: OPAQUE-3DH with ristretto255 and SHA-512
      parameters:
        - $ref: '#/components/parameters/SpaceId'
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, registration_request]
              properties:
                username:
                  type: string
                  minLength: 1
                  maxLength: 255
                  pattern: '^[a-zA-Z0-9._@+-]+$'
                  description: |
                    Username for OPAQUE registration. Must be unique within the space.
                    This is separate from the Ed25519 public key identity.
                  example: "alice"
                registration_request:
                  type: string
                  format: base64
                  description: |
                    OPAQUE RegistrationRequest message (base64-encoded).
                    Contains the blinded password element for OPRF evaluation.
      responses:
        '200':
          description: Registration request accepted, server response returned
          content:
            application/json:
              schema:
                type: object
                required: [registration_response]
                properties:
                  registration_response:
                    type: string
                    format: base64
                    description: |
                      OPAQUE RegistrationResponse message (base64-encoded).
                      Contains the server's OPRF evaluation and public key.
        '400':
          description: Invalid request format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Username already registered in this space
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '501':
          description: OPAQUE is not enabled for this space
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /spaces/{space_id}/opaque/register/finish:
    post:
      tags: [OPAQUE]
      summary: Complete OPAQUE registration
      description: |
        Complete the OPAQUE registration flow. The client submits its registration record
        and receives the computed password_file to store via the `/data` API.

        This is step 2 of 2 in OPAQUE registration. The server:
        - Computes the OPAQUE password_file from the registration_record
        - Returns the password_file for the client to store

        After receiving the response, the client must:
        1. Wrap its credentials using OPAQUE's `export_key`
        2. Assemble the complete OPAQUE record (password_file + encrypted_credentials + public_key)
        3. Sign and store via `PUT /data/opaque/users/{username}`

        **Requires authentication**: Must be called by the same authenticated user who called
        `/opaque/register/init`. This ensures continuity of the registration flow.

        **Credential wrapping** (done by client after this call):
        ```
        wrap_key = HKDF-SHA256(export_key, info="reeeductio-credential-wrap")
        encrypted_creds = AES-256-GCM(wrap_key, nonce, privateKey || symmetricRoot)
        ```

        **Storage format** (stored by client at `opaque/users/{username}`):
        ```json
        {
          "password_file": "<base64 from this response>",
          "encrypted_credentials": "<base64 AES-GCM blob>",
          "public_key": "<44-char Ed25519 pubkey>"
        }
        ```
      parameters:
        - $ref: '#/components/parameters/SpaceId'
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, registration_record]
              properties:
                username:
                  type: string
                  minLength: 1
                  maxLength: 255
                  pattern: '^[a-zA-Z0-9._@+-]+$'
                  description: Username (must match the one used in register/init)
                  example: "alice"
                registration_record:
                  type: string
                  format: base64
                  description: |
                    OPAQUE RegistrationRecord message (base64-encoded).
                    Contains the client's envelope and OPAQUE AKE public key.
      responses:
        '200':
          description: Registration protocol completed, password_file returned for client storage
          content:
            application/json:
              schema:
                type: object
                required: [password_file]
                properties:
                  password_file:
                    type: string
                    format: base64
                    description: |
                      OPAQUE PasswordFile (base64-encoded). The client must store this
                      along with encrypted_credentials and public_key at the path
                      `opaque/users/{username}` via the `/data` API.
        '400':
          description: Invalid registration record or mismatched username
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Authentication failed or registration must be completed by the same user who initiated it
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: No pending registration found for this username (init not called or expired)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Username already fully registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '501':
          description: OPAQUE is not enabled for this space
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /spaces/{space_id}/opaque/login/init:
    post:
      tags: [OPAQUE]
      summary: Start OPAQUE login
      description: |
        Begin the OPAQUE login flow. The client sends a credential request containing
        a blinded password element. The server responds with:
        - The OPRF evaluation
        - The user's OPAQUE envelope (encrypted with export_key)
        - Key exchange message (KE2)

        This is step 1 of 2 in OPAQUE login. After processing the response, the client
        can derive its credentials and must complete authentication via `/opaque/login/finish`.

        **Rate limiting**: This endpoint is rate-limited to prevent brute-force attacks.
        Excessive failed attempts may result in temporary account lockout.

        **Protocol**: OPAQUE-3DH with ristretto255 and SHA-512
      parameters:
        - $ref: '#/components/parameters/SpaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, credential_request]
              properties:
                username:
                  type: string
                  minLength: 1
                  maxLength: 255
                  pattern: '^[a-zA-Z0-9._@+-]+$'
                  description: Username for OPAQUE login
                  example: "alice"
                credential_request:
                  type: string
                  format: base64
                  description: |
                    OPAQUE CredentialRequest message (base64-encoded).
                    Contains the blinded password element and client key exchange data (KE1).
      responses:
        '200':
          description: Credential request accepted, server response returned
          content:
            application/json:
              schema:
                type: object
                required: [credential_response]
                properties:
                  credential_response:
                    type: string
                    format: base64
                    description: |
                      OPAQUE CredentialResponse message (base64-encoded).
                      Contains the server's OPRF evaluation, envelope, and key exchange data (KE2).
        '400':
          description: Invalid request format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Invalid username (user not found or OPAQUE not configured)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Too many login attempts, try again later
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Error'
                  - type: object
                    properties:
                      retry_after:
                        type: integer
                        description: Seconds until next attempt is allowed
        '501':
          description: OPAQUE is not enabled for this space
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /spaces/{space_id}/opaque/login/finish:
    post:
      tags: [OPAQUE]
      summary: Complete OPAQUE login
      description: |
        Complete the OPAQUE login flow. The client submits its key exchange finalization (KE3).
        The server validates the OPAQUE protocol completion and returns the encrypted
        credentials blob that was stored during registration.

        This is step 2 of 2 in OPAQUE login. After receiving the encrypted credentials,
        the client:
        1. Derives `wrap_key` from OPAQUE's `export_key`
        2. Decrypts the credentials blob to obtain `privateKey` and `symmetricRoot`
        3. Proceeds to standard Ed25519 challenge-response authentication

        **Important**: This endpoint does NOT return a session token. The client must
        still authenticate via `/auth/challenge` and `/auth/verify` using the recovered
        Ed25519 keypair.
      parameters:
        - $ref: '#/components/parameters/SpaceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, credential_finalization]
              properties:
                username:
                  type: string
                  minLength: 1
                  maxLength: 255
                  pattern: '^[a-zA-Z0-9._@+-]+$'
                  description: Username (must match the one used in login/init)
                  example: "alice"
                credential_finalization:
                  type: string
                  format: base64
                  description: |
                    OPAQUE CredentialFinalization message (base64-encoded).
                    Contains the client's key exchange finalization (KE3) proving
                    knowledge of the password without revealing it.
      responses:
        '200':
          description: OPAQUE login successful, encrypted credentials returned
          content:
            application/json:
              schema:
                type: object
                required: [encrypted_credentials, public_key]
                properties:
                  encrypted_credentials:
                    type: string
                    format: base64
                    description: |
                      AES-256-GCM encrypted blob containing the user's credentials.
                      Decrypt with key derived from OPAQUE's `export_key`:
                      ```
                      wrap_key = HKDF-SHA256(export_key, info="reeeductio-credential-wrap")
                      plaintext = AES-256-GCM-Decrypt(wrap_key, encrypted_credentials)
                      privateKey = plaintext[0:32]
                      symmetricRoot = plaintext[32:64]
                      ```
                  public_key:
                    type: string
                    pattern: '^[A-Za-z0-9_-]{44}$'
                    minLength: 44
                    maxLength: 44
                    description: |
                      The user's Ed25519 public key. Use this with the recovered
                      private key for challenge-response authentication.
        '400':
          description: Invalid credential finalization message
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: OPAQUE authentication failed (wrong password or protocol error)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: No pending login found for this username (init not called or expired)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          description: Too many failed login attempts, account temporarily locked
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Error'
                  - type: object
                    properties:
                      retry_after:
                        type: integer
                        description: Seconds until next attempt is allowed
        '501':
          description: OPAQUE is not enabled for this space
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /spaces/{space_id}/data/{path}:
    get:
      tags: [Data]
      summary: Get data value
      description: Retrieve simple key-value data as base64-encoded string
      parameters:
        - $ref: '#/components/parameters/SpaceId'
        - name: path
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9._-]+(/[a-zA-Z0-9._-]+)*$'
          description: |
            Data path using slug-formatted segments (alphanumeric, dots, hyphens, underscores).
            Examples: "profiles/alice", "settings/theme", "cache/user_list"
            Wildcards like {self}, {any} are NOT allowed in user-created paths.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Data retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataEntry'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    put:
      tags: [Data]
      summary: Set data value
      description: |
        Create or update simple key-value data with cryptographic signature verification.
        All data entries must be signed - the server verifies the signature before storing.
      parameters:
        - $ref: '#/components/parameters/SpaceId'
        - name: path
          in: path
          required: true
          schema:
            type: string
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [data, signature, signed_by, signed_at]
              properties:
                data:
                  type: string
                  format: base64
                  description: Base64-encoded data (interpretation is context-dependent)
                signature:
                  type: string
                  format: base64
                  description: Ed25519 signature over (space_id|path|data|signed_at) by signer (REQUIRED for all data writes)
                signed_by:
                  type: string
                  pattern: '^[A-Za-z0-9_-]{44}$'
                  minLength: 44
                  maxLength: 44
                  description: Typed user/tool identifier of signer (REQUIRED for all data writes)
                signed_at:
                  type: integer
                  format: int64
                  description: Unix timestamp in milliseconds when entry was signed (REQUIRED for all data writes)
      responses:
        '200':
          description: Data updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  path:
                    type: string
                  signed_at:
                    type: integer
                    format: int64
                    description: Unix timestamp in milliseconds from the signed data entry
        '400':
          description: Invalid signature or missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /spaces/{space_id}/state:
    get:
      tags: [State]
      summary: Query all state messages
      description: |
        Retrieve all state change messages from the "state" topic. This is effectively
        an alias for GET /spaces/{space_id}/topics/state/messages. State is stored as
        messages with the state path in the "type" field.
      parameters:
        - $ref: '#/components/parameters/SpaceId'
        - name: from
          in: query
          schema:
            type: integer
            format: int64
          description: Server timestamp in milliseconds (inclusive) - get messages after this time
        - name: to
          in: query
          schema:
            type: integer
            format: int64
          description: Server timestamp in milliseconds (inclusive) - get messages before this time
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 1000
          description: Maximum number of messages to return
      security:
        - BearerAuth: []
      responses:
        '200':
          description: State messages retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: '#/components/schemas/Message'
                  has_more:
                    type: boolean
                    description: Whether more messages exist beyond the limit
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /spaces/{space_id}/state/{path}:
    get:
      tags: [State]
      summary: Get current state at path
      description: |
        Retrieve the current (materialized) state value at a specific path. The server
        computes this by replaying state messages from the "state" topic to find the
        latest value for this path.
      parameters:
        - $ref: '#/components/parameters/SpaceId'
        - name: path
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-zA-Z0-9._-]+(/[a-zA-Z0-9._-]+)*$'
          description: |
            State path using slug-formatted segments (alphanumeric, dots, hyphens, underscores).
            Examples: "auth/users/U_abc123", "auth/roles/admin", "config/settings"
            Wildcards like {self}, {any} are NOT allowed in user-created paths.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: State retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    put:
      tags: [State]
      summary: Set state value
      description: |
        Create or update state by posting a message to the "state" topic. The message's
        "type" field contains the state path, and the "data" field contains the state value.
        Server validates chain integrity (prev_hash) and creates an immutable audit log.
      parameters:
        - $ref: '#/components/parameters/SpaceId'
        - name: path
          in: path
          required: true
          schema:
            type: string
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prev_hash, data, message_hash, signature, signed_at]
              properties:
                prev_hash:
                  type: string
                  pattern: '^[A-Za-z0-9_-]{44}$'
                  minLength: 44
                  maxLength: 44
                  nullable: true
                  description: Typed message identifier of previous message in state topic (null for first state message)
                data:
                  type: string
                  format: base64
                  maxLength: 102400
                  description: Base64-encoded state data (max 100 KB)
                message_hash:
                  type: string
                  pattern: '^[A-Za-z0-9_-]{44}$'
                  minLength: 44
                  maxLength: 44
                  description: Typed message identifier (SHA256 hash with header, client-computed)
                signature:
                  type: string
                  format: base64
                  description: Ed25519 signature over message_hash by sender
                signed_at:
                  type: integer
                  format: int64
                  description: Unix timestamp in milliseconds when state was signed (REQUIRED)
      responses:
        '201':
          description: State message created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message_hash:
                    type: string
                    pattern: '^[A-Za-z0-9_-]{44}$'
                    minLength: 44
                    maxLength: 44
                  server_timestamp:
                    type: integer
                    format: int64
                    description: Unix timestamp in milliseconds
        '400':
          description: Invalid message (bad hash, broken chain, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Chain conflict (prev_hash doesn't match current head)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /spaces/{space_id}/topics/{topic_id}/messages:
    get:
      tags: [Messages]
      summary: Query messages in a topic
      description: Retrieve messages with optional time-based filtering
      parameters:
        - $ref: '#/components/parameters/SpaceId'
        - $ref: '#/components/parameters/TopicId'
        - name: from
          in: query
          schema:
            type: integer
            format: int64
          description: Server timestamp in milliseconds (inclusive) - get messages after this time
        - name: to
          in: query
          schema:
            type: integer
            format: int64
          description: Server timestamp in milliseconds (inclusive) - get messages before this time
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
            maximum: 1000
          description: Maximum number of messages to return
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Messages retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      $ref: '#/components/schemas/Message'
                  has_more:
                    type: boolean
                    description: Whether more messages exist beyond the limit
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags: [Messages]
      summary: Post a message to a topic
      description: |
        Publish an encrypted message to the topic. Server validates:
        - User has 'create' capability on this topic's message path
        - prev_hash matches the current chain head
        - Message hash is correctly computed
      parameters:
        - $ref: '#/components/parameters/SpaceId'
        - $ref: '#/components/parameters/TopicId'
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, prev_hash, data, message_hash, signature]
              properties:
                type:
                  type: string
                  description: |
                    Message type/category. For state messages in the "state" topic, this contains
                    the state path (e.g., "auth/users/U_abc123"). For regular messages, can be used
                    for app-specific categorization (e.g., "chat", "notification").
                  example: "chat"
                prev_hash:
                  type: string
                  pattern: '^[A-Za-z0-9_-]{44}$'
                  minLength: 44
                  maxLength: 44
                  nullable: true
                  description: Typed message identifier of previous message (null for first message)
                data:
                  type: string
                  format: base64
                  maxLength: 102400
                  description: Encrypted message or state data (max 100 KB, base64-encoded)
                message_hash:
                  type: string
                  pattern: '^[A-Za-z0-9_-]{44}$'
                  minLength: 44
                  maxLength: 44
                  description: Typed message identifier (SHA256 hash with header, client-computed)
                signature:
                  type: string
                  format: base64
                  description: Ed25519 signature over message_hash by sender
      responses:
        '201':
          description: Message created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message_hash:
                    type: string
                    pattern: '^[A-Za-z0-9_-]{44}$'
                    minLength: 44
                    maxLength: 44
                  server_timestamp:
                    type: integer
                    format: int64
                    description: Unix timestamp in milliseconds
        '400':
          description: Invalid message (bad hash, broken chain, etc.)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          description: Chain conflict (prev_hash doesn't match current head)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /spaces/{space_id}/topics/{topic_id}/messages/{message_hash}:
    get:
      tags: [Messages]
      summary: Get specific message by hash from a topic
      description: Retrieve a single message from a specific topic using its content hash
      parameters:
        - $ref: '#/components/parameters/SpaceId'
        - $ref: '#/components/parameters/TopicId'
        - name: message_hash
          in: path
          required: true
          schema:
            type: string
            pattern: '^[A-Za-z0-9_-]{44}$'
            minLength: 44
            maxLength: 44
          description: Typed message identifier (SHA256 hash with header)
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Message retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /spaces/{space_id}/stream:
    get:
      tags: [WebSocket]
      summary: WebSocket stream for real-time space messages
      description: |
        Establishes a WebSocket connection to receive real-time messages from all topics in the space.

        **Protocol**: WebSocket (ws:// or wss://)

        **Authentication**: Pass JWT token as query parameter `?token=<jwt>` or in the `Sec-WebSocket-Protocol` header.

        **Message Format**: JSON-encoded message objects (same schema as Message)

        **Connection**: Upgrade from HTTP to WebSocket using standard WebSocket handshake.
      parameters:
        - $ref: '#/components/parameters/SpaceId'
        - name: token
          in: query
          required: false
          schema:
            type: string
          description: JWT bearer token for authentication (alternative to Sec-WebSocket-Protocol header)
      responses:
        '101':
          description: Switching Protocols - WebSocket connection established
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
      x-websocket:
        messageSchema:
          $ref: '#/components/schemas/Message'

  /spaces/{space_id}/blobs/{blob_id}:
    put:
      tags: [Blobs]
      summary: Upload encrypted blob
      description: |
        Upload encrypted binary data (attachments, images, etc.) with explicit blob_id.
        The blob_id must match the SHA256 hash of the content.
        Re-uploading the same blob_id is allowed and treated as idempotent.
        Blobs are scoped to the space - only space members can access them.
      parameters:
        - $ref: '#/components/parameters/SpaceId'
        - name: blob_id
          in: path
          required: true
          schema:
            type: string
            pattern: '^[A-Za-z0-9_-]{44}$'
            minLength: 44
            maxLength: 44
          description: Typed blob identifier (SHA256 hash with header)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
              maxLength: 104857600
      responses:
        '201':
          description: Blob uploaded successfully (direct upload to server)
          content:
            application/json:
              schema:
                type: object
                properties:
                  blob_id:
                    type: string
                    pattern: '^[A-Za-z0-9_-]{44}$'
                    minLength: 44
                    maxLength: 44
                    description: Typed blob identifier (SHA256 hash with header)
                  size:
                    type: integer
                    description: Size in bytes
        '200':
          description: Pre-signed upload URL returned (for S3-backed storage)
          content:
            application/json:
              schema:
                type: object
                properties:
                  blob_id:
                    type: string
                    pattern: '^[A-Za-z0-9_-]{44}$'
                    minLength: 44
                    maxLength: 44
                    description: Typed blob identifier (SHA256 hash with header)
                  upload_url:
                    type: string
                    format: uri
                    description: Pre-signed S3 URL for uploading the blob directly to object storage
        '400':
          description: Invalid blob_id format, type, or blob_id doesn't match content hash
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '413':
          description: Blob too large (max 100 MB)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    get:
      tags: [Blobs]
      summary: Download blob
      description: |
        Retrieve encrypted blob by its content hash.
        Only accessible to members of the same space where the blob was uploaded.
      parameters:
        - $ref: '#/components/parameters/SpaceId'
        - name: blob_id
          in: path
          required: true
          schema:
            type: string
            pattern: '^[A-Za-z0-9_-]{44}$'
            minLength: 44
            maxLength: 44
          description: Typed blob identifier
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Blob retrieved successfully or pre-signed download URL returned
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
            application/json:
              schema:
                type: object
                description: Pre-signed download URL (for S3-backed storage)
                properties:
                  blob_id:
                    type: string
                    pattern: '^[A-Za-z0-9_-]{44}$'
                    minLength: 44
                    maxLength: 44
                    description: Typed blob identifier (SHA256 hash with header)
                  download_url:
                    type: string
                    format: uri
                    description: Pre-signed S3 URL for downloading the blob directly from object storage
        '403':
          description: Blob belongs to a different space
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

    delete:
      tags: [Blobs]
      summary: Delete blob
      description: |
        Remove blob from storage.
        Only the uploader or space admin can delete a blob.
      parameters:
        - $ref: '#/components/parameters/SpaceId'
        - name: blob_id
          in: path
          required: true
          schema:
            type: string
            pattern: '^[A-Za-z0-9_-]{44}$'
            minLength: 44
            maxLength: 44
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Blob deleted successfully
        '403':
          description: Not authorized to delete this blob (must be uploader or space admin)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # Admin API Endpoints
  /admin/auth/challenge:
    post:
      tags: [Admin]
      summary: Request admin authentication challenge
      description: |
        Convenience endpoint to get an authentication challenge for the admin space.
        This allows clients to authenticate without knowing the admin space ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [public_key]
              properties:
                public_key:
                  type: string
                  pattern: '^[A-Za-z0-9_-]{44}$'
                  minLength: 44
                  maxLength: 44
                  description: Typed user identifier (44-char URL-safe base64, Ed25519 public key with header byte)
      responses:
        '200':
          description: Challenge issued successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  challenge:
                    type: string
                    format: base64
                    description: Random nonce to sign
                  expires_at:
                    type: integer
                    format: int64
                    description: Unix timestamp in milliseconds when challenge expires
        '400':
          $ref: '#/components/responses/BadRequest'

  /admin/auth/verify:
    post:
      tags: [Admin]
      summary: Verify admin authentication and get JWT
      description: |
        Convenience endpoint to verify signed challenge and receive JWT token for the admin space.
        This allows clients to authenticate without knowing the admin space ID.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [public_key, signature, challenge]
              properties:
                public_key:
                  type: string
                  pattern: '^[A-Za-z0-9_-]{44}$'
                  minLength: 44
                  maxLength: 44
                  description: Typed user identifier (44-char URL-safe base64)
                signature:
                  type: string
                  format: base64
                  description: Signature of challenge
                challenge:
                  type: string
                  format: base64
                  description: The challenge that was signed
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: JWT bearer token for admin space
                  expires_at:
                    type: integer
                    format: int64
                    description: Unix timestamp in milliseconds when token expires
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/space:
    get:
      tags: [Admin]
      summary: Get the admin space ID
      description: |
        Returns the admin space ID. This allows clients to use the standard
        /spaces/{space_id}/* endpoints for admin operations like managing users,
        spaces, and performing other administrative tasks.

        After obtaining the admin space ID, clients should use the regular Space
        client with this ID to perform admin operations through the standard
        state and message endpoints.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Admin space ID retrieved successfully
          content:
            application/json:
              schema:
                type: object
                required: [space_id]
                properties:
                  space_id:
                    type: string
                    pattern: '^[A-Za-z0-9_-]{44}$'
                    minLength: 44
                    maxLength: 44
                    description: Typed admin space identifier
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/blobs/{blob_id}:
    delete:
      tags: [Admin]
      summary: Delete blob from storage
      description: |
        Delete a blob directly from the server's blob storage. This is an admin
        operation that bypasses normal space-scoped blob deletion, allowing
        server admins to remove orphaned or problematic blobs.

        This endpoint is necessary because blobs are stored separately from
        space state and cannot be deleted through the regular state API.
      parameters:
        - $ref: '#/components/parameters/BlobId'
      security:
        - BearerAuth: []
      responses:
        '204':
          description: Blob deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained from /auth/verify

  parameters:
    SpaceId:
      name: space_id
      in: path
      required: true
      schema:
        type: string
        pattern: '^[A-Za-z0-9_-]{44}$'
        minLength: 44
        maxLength: 44
      description: Typed space identifier (44-char URL-safe base64, Ed25519 public key with header byte)

    TopicId:
      name: topic_id
      in: path
      required: true
      schema:
        type: string
        pattern: '^[a-z0-9][a-z0-9_-]{0,62}[a-z0-9]$'
        minLength: 2
        maxLength: 64
      description: Topic identifier (slug format - lowercase alphanumeric, hyphens, underscores)

    UserId:
      name: user_id
      in: path
      required: true
      schema:
        type: string
        pattern: '^[A-Za-z0-9_-]{44}$'
        minLength: 44
        maxLength: 44
      description: Typed user identifier (44-char URL-safe base64, Ed25519 public key with header byte)

    BlobId:
      name: blob_id
      in: path
      required: true
      schema:
        type: string
        pattern: '^[A-Za-z0-9_-]{44}$'
        minLength: 44
        maxLength: 44
      description: Typed blob identifier (SHA256 hash with header)

  schemas:
    Message:
      type: object
      properties:
        message_hash:
          type: string
          pattern: '^[A-Za-z0-9_-]{44}$'
          minLength: 44
          maxLength: 44
          description: Typed message identifier
        topic_id:
          type: string
          pattern: '^[a-z0-9][a-z0-9_-]{0,62}[a-z0-9]$'
        type:
          type: string
          description: |
            Message type/category. For state messages in the "state" topic, this field
            contains the state path (e.g., "auth/users/U_abc123"). For regular messages,
            this can be used for application-specific categorization (e.g., "chat", "notification").
          example: "auth/users/U_abc123"
        prev_hash:
          type: string
          pattern: '^[A-Za-z0-9_-]{44}$'
          minLength: 44
          maxLength: 44
          nullable: true
          description: Typed message identifier of previous message
        data:
          type: string
          format: base64
          maxLength: 102400
          description: Encrypted message or state data (max 100 KB, base64-encoded)
        sender:
          type: string
          pattern: '^[A-Za-z0-9_-]{44}$'
          minLength: 44
          maxLength: 44
          description: Typed user identifier of message sender
        signature:
          type: string
          format: base64
          description: Ed25519 signature over message_hash by sender
        server_timestamp:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds (for queries)

    Capability:
      type: object
      required: [op, path]
      properties:
        op:
          type: string
          enum: [read, create, write]
          description: Operation type (write is superset of create)
        path:
          type: string
          description: |
            State path pattern supporting wildcards:
            - {self} - resolves to acting user's ID
            - {any} - matches any single segment
            - {other} - matches any ID except acting user
            - Trailing / indicates prefix match
            Examples: "profiles/{self}/", "topics/{any}/messages/", "auth/users/{other}/banned"
          example: "profiles/{self}/"

    Member:
      type: object
      properties:
        public_key:
          type: string
          pattern: '^[A-Za-z0-9_-]{44}$'
          minLength: 44
          maxLength: 44
          description: Typed user identifier
        added_at:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds when member was added
        added_by:
          type: string
          pattern: '^[A-Za-z0-9_-]{44}$'
          minLength: 44
          maxLength: 44
          description: Typed user identifier of user who added this member

    Role:
      type: object
      required: [role_id, description, created_by, created_at, signature]
      description: |
        Role definition stored at path: auth/roles/{role_id}
        Capabilities for this role stored at: auth/roles/{role_id}/rights/{cap_id}
      properties:
        role_id:
          type: string
          pattern: '^[a-zA-Z0-9._-]+$'
          description: Human-readable role identifier (e.g., "admin", "user", "moderator")
          example: "user"
        description:
          type: string
          description: Human-readable description of this role
          example: "Default user role with read and post permissions"
        created_by:
          type: string
          pattern: '^[A-Za-z0-9_-]{44}$'
          minLength: 44
          maxLength: 44
          description: Typed user identifier of role creator
        created_at:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds when role was created
        signature:
          type: string
          format: base64
          description: Ed25519 signature over the role definition by creator

    RoleGrant:
      type: object
      required: [user_id, role_id, granted_by, granted_at, signature]
      description: |
        Role grant stored at path: auth/users/{user_id}/roles/{role_id}
        Grants a user membership in a role, inheriting all capabilities defined for that role.
      properties:
        user_id:
          type: string
          pattern: '^[A-Za-z0-9_-]{44}$'
          minLength: 44
          maxLength: 44
          description: Typed user identifier of the user receiving the role
        role_id:
          type: string
          pattern: '^[a-zA-Z0-9._-]+$'
          description: Human-readable role identifier being granted
          example: "user"
        granted_by:
          type: string
          pattern: '^[A-Za-z0-9_-]{44}$'
          minLength: 44
          maxLength: 44
          description: Typed user identifier of the user granting this role
        granted_at:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds when role was granted
        expires_at:
          type: integer
          format: int64
          description: Optional Unix timestamp in milliseconds when role grant expires
        signature:
          type: string
          format: base64
          description: Ed25519 signature over the role grant by granter

    DataEntry:
      type: object
      required: [path, data, signature, signed_by, signed_at]
      description: |
        Simple key-value data entry stored in the space's data store.
        Every data entry must be cryptographically signed.
      properties:
        path:
          type: string
          pattern: '^[a-zA-Z0-9._-]+(/[a-zA-Z0-9._-]+)*$'
          description: |
            Data path using slug-formatted segments (alphanumeric, dots, hyphens, underscores).
            Examples: "profiles/alice", "settings/theme", "cache/user_list"
            Wildcards like {self}, {any} are NOT allowed in user-created paths.
        data:
          type: string
          format: base64
          description: Base64-encoded data (interpretation is context-dependent)
        signature:
          type: string
          format: base64
          description: Ed25519 signature over the data entry (space_id|path|data|signed_at) by signer
        signed_by:
          type: string
          pattern: '^[A-Za-z0-9_-]{44}$'
          minLength: 44
          maxLength: 44
          description: Typed user/tool identifier of signer
        signed_at:
          type: integer
          format: int64
          description: Unix timestamp in milliseconds when entry was signed

    StateEntry:
      description: |
        DEPRECATED: State is now stored as messages in the "state" topic.
        Use the Message schema instead. This schema is kept for backward compatibility.
      allOf:
        - $ref: '#/components/schemas/DataEntry'

    OpaqueCredentials:
      type: object
      description: |
        Encrypted credentials blob stored alongside OPAQUE records.
        Contains the user's Ed25519 private key and space symmetric root,
        encrypted with a key derived from OPAQUE's export_key.
      required: [encrypted_credentials, public_key]
      properties:
        encrypted_credentials:
          type: string
          format: base64
          description: |
            AES-256-GCM encrypted credentials. Structure:
            - Bytes 0-11: GCM nonce (12 bytes)
            - Bytes 12-43: Encrypted Ed25519 private key (32 bytes)
            - Bytes 44-75: Encrypted symmetric root (32 bytes)
            - Bytes 76-91: GCM authentication tag (16 bytes)

            Wrapping key derivation:
            ```
            wrap_key = HKDF-SHA256(
              ikm=export_key,
              salt=empty,
              info="reeeductio-credential-wrap",
              length=32
            )
            ```
        public_key:
          type: string
          pattern: '^[A-Za-z0-9_-]{44}$'
          minLength: 44
          maxLength: 44
          description: Ed25519 public key (for verification and RBAC lookup)

    OpaqueUserRecord:
      type: object
      description: |
        OPAQUE user record stored at `opaque/users/{username}` via the /data API.
        This is stored as a signed data entry with the JSON content base64-encoded.
      required: [password_file, encrypted_credentials, public_key]
      properties:
        password_file:
          type: string
          format: base64
          description: |
            OPAQUE PasswordFile (base64-encoded). Returned by the server during
            registration and used by the server during login to evaluate the OPRF.
        encrypted_credentials:
          type: string
          format: base64
          description: |
            AES-256-GCM encrypted credentials blob. Contains the user's Ed25519
            private key and symmetric root, wrapped with a key derived from
            OPAQUE's export_key. Returned to the client after successful login.
        public_key:
          type: string
          pattern: '^[A-Za-z0-9_-]{44}$'
          minLength: 44
          maxLength: 44
          description: User's Ed25519 public key (for verification and RBAC lookup)

    Error:
      type: object
      properties:
        error:
          type: string
          description: Error message
        code:
          type: string
          description: Error code
        details:
          type: object
          description: Additional error details

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Unauthorized:
      description: Authentication required or failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
