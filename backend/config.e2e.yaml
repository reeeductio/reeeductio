# End-to-end testing configuration
# Used with docker-compose.e2e.yml

environment: test
debug: true

server:
  host: "0.0.0.0"
  port: 8000
  jwt_secret: "e2e-test-jwt-secret-do-not-use-in-production"
  jwt_expiry_hours: 1
  challenge_expiry_seconds: 300
  max_message_size: 102400
  max_blob_size: 10485760  # 10 MB for e2e tests

# Use Firestore emulator (FIRESTORE_EMULATOR_HOST env var set in docker-compose)
database:
  type: firestore
  project_id: e2e-test-project
  database_id: "(default)"

# Use S3 (MinIO) for blob storage in e2e tests
blob_store:
  type: s3
  bucket_name: e2e-test-bucket
  endpoint_url: http://minio:9000
  public_endpoint_url: http://localhost:9000
  access_key_id: minioadmin
  secret_access_key: minioadmin
  region_name: us-east-1
  presigned_url_expiration: 3600

logging:
  level: DEBUG
  format: text
  enable_access_log: true

# Admin space configuration for e2e tests
# These credentials are generated from a deterministic test key (32 bytes of 0x01)
# DO NOT use these credentials in production!
admin:
  space_id: "CIqI4910CfGV_VLbLTy6XXLKZwm_HZQSG_N0iAG0D29c"
  user_id: "UIqI4910CfGV_VLbLTy6XXLKZwm_HZQSG_N0iAG0D29c"
  private_key: "AQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQEBAQE="
